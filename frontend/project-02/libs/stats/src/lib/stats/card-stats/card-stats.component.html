@if (dashboardItem(); as item) {
<mat-card class="example-card" appearance="outlined" style="width: 300px; cursor: pointer;">

    <mat-card-header>
        <div mat-card-avatar class="example-header-image"></div>
        <mat-card-title> {{ item.title }} </mat-card-title>
        <mat-card-subtitle> {{ item.subtitle }} </mat-card-subtitle>
    </mat-card-header>
    <ng-container *ngTemplateOutlet="iconTemplate()"></ng-container>
    <mat-card-content>
        @for (content of item.content; track content; let i = $index) {

        <p>
            {{ content.description }}
        </p>
        }
    </mat-card-content>
    <mat-card-actions>
        <ng-container *ngTemplateOutlet="actionTemplate()"></ng-container>

    </mat-card-actions>

</mat-card>
}@else {
    <p>No data available</p>
}
