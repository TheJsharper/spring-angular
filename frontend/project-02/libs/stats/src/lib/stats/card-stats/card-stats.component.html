<mat-card class="example-card" appearance="outlined" style="width: 300px; cursor: pointer;" >
<!--(click)="nav('bar-chart')">-->
    <mat-card-header>
        <div mat-card-avatar class="example-header-image"></div>
        <mat-card-title> {{ dashboardItem.title }} </mat-card-title>
                    <mat-card-subtitle> {{ dashboardItem.subtitle }} </mat-card-subtitle>
    </mat-card-header>
    <!--<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="#e3e3e3">
        <path class="draw" stroke-linejoin="round" stroke="#C29C86" fill="none" stroke-width="10"
            d="M160-200v-60h640v60H160Zm0-120v-60h640v60H160Zm0-120v-60h640v60H160Z" />
    </svg>-->
    <ng-container *ngTemplateOutlet="iconTemplate"></ng-container>
    <mat-card-content>
       @for (item of dashboardItem.content; track $index) {

           <p >
                {{ item }}   
           </p>
       }
    </mat-card-content>
    <mat-card-actions>
        <!--<button matButton (click)="nav('bar-chart')">go to bar chart</button>-->
        <ng-container *ngTemplateOutlet="actionTemplate"></ng-container>
       <h1>Helllo</h1>
        
    </mat-card-actions>

</mat-card>
