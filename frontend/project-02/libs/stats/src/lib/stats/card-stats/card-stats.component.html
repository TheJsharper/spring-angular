<mat-card class="example-card" appearance="outlined" style="width: 300px; cursor: pointer;">

    <mat-card-header>
        <div mat-card-avatar class="example-header-image"></div>
        <mat-card-title> {{ dashboardItem().title }} </mat-card-title>
        <mat-card-subtitle> {{ dashboardItem().subtitle }} </mat-card-subtitle>
    </mat-card-header>
    <ng-container *ngTemplateOutlet="iconTemplate()"></ng-container>
    <mat-card-content>
        @for (item of dashboardItem().content; track $index) {

        <p>
            {{ item }}
        </p>
        }
    </mat-card-content>
    <mat-card-actions>
        <ng-container *ngTemplateOutlet="actionTemplate()"></ng-container>

    </mat-card-actions>

</mat-card>
