<div style="display: flex;  flex-wrap: wrap; gap: 16px; flex-wrap: wrap; margin-top: 20px;">


    @for (item of data; track item.name; let i = $index) {

    <lib-card-stats [dashboardItem]="item">
        <ng-container *libCardStats>
            @if(item.key){

            @let path = `assets/stats/pics/${item.key}.svg`;

            <img [src]="path" alt="{{ item.title }} icon" style="width: 200px; height: 200px; margin: 50px;">


            }
        </ng-container>

        <ng-container *libActionStats>
            @if(item.name && item.actions.length > 0) {

            @let navPath = item.name;

            @for (a of item.actions; track $index) {

            <button matButton (click)="nav(navPath)">go to {{ a }}</button>
            }

            }
        </ng-container>
    </lib-card-stats>
    }

                period.</mat-card-subtitle>
        </mat-card-header>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="#e3e3e3">

        <mat-card-content>
            <p>
                The config of the candlestick chart is not completely the same as the line chart and bar chart. There is
                no need
                to configure the axis, but we need to set the min and max values in series to define the range of the
                candlestick chart.
            </p>
        </mat-card-content>
        <mat-card-actions>
            <button matButton (click)="nav('candlestick-chart')">go to candlestick chart</button>
